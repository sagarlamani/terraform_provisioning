name: Terraform GitOps

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Environment to apply manually"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      TF_ENV: staging
      TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
    concurrency:
      group: terraform-pr-${{ github.event.pull_request.number }}-staging
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -no-color -reconfigure -backend-config="key=${TF_ENV}/terraform.tfstate"

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -no-color -lock=false -var-file="environments/${TF_ENV}.tfvars" -out="${TF_ENV}.tfplan"

  apply-staging:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_ENV: staging
      TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}
    concurrency:
      group: terraform-apply-staging
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false -no-color -reconfigure -backend-config="key=${TF_ENV}/terraform.tfstate"

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -no-color -var-file="environments/${TF_ENV}.tfvars"

  apply-production:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'production' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_ENV: production
      TF_VAR_db_password: ${{ secrets.PRODUCTION_DB_PASSWORD }}
    concurrency:
      group: terraform-apply-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false -no-color -reconfigure -backend-config="key=${TF_ENV}/terraform.tfstate"

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -no-color -var-file="environments/${TF_ENV}.tfvars"
